{% extends 'base.html' %}

{% block title %}Product List{% endblock %}

{% block content %}
<table border="1px">
    <Thead>
        <tr>
            <th>Name</th>
            <th>Price</th>
            <th>Catagory</th>
            <th>Stock</th>
            <th>Action</th>
        </tr>
    </Thead>
    <Tbody>
        {% for product in products %}
        <tr>
            <td>{{ product.name }}</td>
            <td>{{ product.price }}</td>
            <td>{{ product.catagory }}</td>
            <td>{{ product.stock }}</td>
            <td>
                <a href="{% url 'edit' product.id %}"><button>Edit</button></a>
                <a href="{% url 'delete' product.id %}"><button>Delete</button></a>
            </td>
        </tr>
        {% endfor %}
    </Tbody>
</table>
{% endblock %}
