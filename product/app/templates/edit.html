{% extends 'base.html' %}

{% block title %}Edit Product{% endblock %}

{% block content %}

<h2>Edit Product</h2>

<form method="post">
    {% csrf_token %}

    <div>
        <label for="name">Name:</label>
        <input 
            type="text" 
            id="name"
            name="name" 
            value="{{ product.name }}" 
            required>
    </div>

    <br>

    <div>
        <label for="price">Price:</label>
        <input 
            type="number" 
            id="price"
            name="price" 
            step="0.01"
            value="{{ product.price }}" 
            required>
    </div>

    <br>

    <div>
        <label for="catagory">Category:</label>
        <input 
            type="text" 
            id="catagory"
            name="catagory" 
            value="{{ product.catagory }}">
    </div>

    <br>

    <div>
        <label for="stock">Stock:</label>
        <input 
            type="number" 
            id="stock"
            name="stock" 
            value="{{ product.stock }}">
    </div>

    <br>

    <br>

    <a href="{% url 'index' %}">
        <button type="button">Cancel</button>
    </a>

    <button type="submit">Update Product</button>

</form>

{% endblock %}
