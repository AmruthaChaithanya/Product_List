{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<h2>Login</h2>
<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Login</button> <br>
    <p>Don't have account? <a href="{% url 'register' %}">Register</a></p>
</form>
{% endblock %}
